{% extends "base.html" %}

{% block public_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='favicon.png') }}" alt="AreaAssist" style="height: 5em;">
                    <h4 class="mt-3 fw-bold">Welcome Back</h4>
                    <p class="text-muted">Login to your account</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <!-- <label class="form-label">User Type</label> -->
                        <select class="form-select rounded-0 form-select-lg border-0 border-bottom border-3 border-primary" name="user_type" required>
                            <option value="">Select User Type</option>
                            <option value="customer">Customer</option>
                            <option value="provider">Service Provider</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" name="password" id="password" placeholder="Enter your password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye" id="passwordIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                </form>
            </div>
            <div class="card-footer py-3 d-flex justify-content-between">
                <p><a href="{{ url_for('index') }}" class="text-dark text-decoration-none"><span  class="badge bg-light">Home</span></a></p>
                <p >Don't have an account? <a href="{{ url_for('register') }}" class="text-primary fw-bold"><span class="badge bg-light text-dark">Register</span></a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
